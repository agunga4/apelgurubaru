<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PESTA KAMPUNG - APeL</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root {
            --maroon: #8B0000;
            --gold: #FFD700;
            --black: #000000;
            --white: #ffffff;
            --sky: #87CEEB;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Bangers', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--gold);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 100%;
            max-height: 450px;
            background: var(--sky);
            border: 6px solid var(--black);
            box-shadow: 12px 12px 0px var(--black);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Elements */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(139, 0, 0, 0.8);
            z-index: 10;
            color: var(--gold);
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 4rem;
            text-shadow: 4px 4px 0px var(--black);
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        .btn {
            background: var(--gold);
            color: var(--black);
            border: 4px solid var(--black);
            padding: 15px 40px;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 6px 6px 0px var(--black);
            transition: 0.1s;
            text-decoration: none;
            margin: 10px;
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px var(--black);
        }

        .hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
        }

        .stat-box {
            background: var(--white);
            border: 3px solid var(--black);
            padding: 5px 15px;
            box-shadow: 4px 4px 0px var(--black);
            font-size: 1.5rem;
            color: var(--maroon);
        }

        #back-btn {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 11;
            padding: 10px 20px;
            font-size: 1.2rem;
            background: #eee;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .stat-box { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- HUD -->
        <div class="hud">
            <div class="stat-box">SKOR: <span id="score">0</span></div>
            <div class="stat-box">NYAWA: <span id="lives">3</span></div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <h1>PESTA KAMPUNG</h1>
            <p style="margin-bottom: 20px; font-size: 1.2rem; color: white;">Lompat melewati rintangan & kumpulkan koin!</p>
            <button class="btn" onclick="startGame()">MULAI MAIN</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="overlay hidden">
            <h1 style="color: #ff4444;">GAME OVER!</h1>
            <div class="stat-box" style="margin-bottom: 20px;">SKOR AKHIR: <span id="final-score">0</span></div>
            <div class="stat-box" style="margin-bottom: 20px;">TERBAIK: <span id="high-score">0</span></div>
            <button class="btn" onclick="startGame()">MAIN LAGI</button>
        </div>

        <canvas id="gameCanvas"></canvas>
        <a href="https://apel-pembelajaran.vercel.app/#games" id="back-btn" class="btn">KELUAR</a>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const finalScoreEl = document.getElementById('final-score');
    const highScoreEl = document.getElementById('high-score');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');

    // Game Constants
    let gameActive = false;
    let score = 0;
    let lives = 3;
    let gameSpeed = 5;
    let frameCount = 0;
    
    // Resize handling
    function resize() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Sound Engine (AudioContext)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const sfx = {
        jump: () => playSound(400, 'square', 0.1),
        coin: () => playSound(800, 'sine', 0.1),
        hit: () => playSound(150, 'sawtooth', 0.3),
        gameOver: () => {
            playSound(200, 'sawtooth', 0.5);
            setTimeout(() => playSound(150, 'sawtooth', 0.5), 200);
        }
    };

    // Game Objects
    const player = {
        x: 80,
        y: 0,
        width: 40,
        height: 60,
        vy: 0,
        gravity: 0.8,
        jumpForce: -15,
        isGrounded: false,
        animFrame: 0,
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            // Neubrutalism Character (Anak Kampung)
            // Body
            ctx.fillStyle = '#FFDAB9'; // Skin
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            
            // Head
            ctx.fillRect(10, 0, 20, 20);
            ctx.strokeRect(10, 0, 20, 20);
            
            // Shirt (Maroon)
            ctx.fillStyle = '#8B0000';
            ctx.fillRect(5, 20, 30, 25);
            ctx.strokeRect(5, 20, 30, 25);
            
            // Legs animation
            ctx.fillStyle = '#000';
            let legOffset = Math.sin(frameCount * 0.2) * 10;
            if (!this.isGrounded) legOffset = 5;
            
            ctx.fillRect(8, 45, 10, 15 + (this.isGrounded ? legOffset : 0));
            ctx.fillRect(22, 45, 10, 15 - (this.isGrounded ? legOffset : 0));
            
            ctx.restore();
        },
        update() {
            this.vy += this.gravity;
            this.y += this.vy;
            
            const groundY = canvas.height - 80 - this.height;
            if (this.y > groundY) {
                this.y = groundY;
                this.vy = 0;
                this.isGrounded = true;
            } else {
                this.isGrounded = false;
            }
        },
        jump() {
            if (this.isGrounded) {
                this.vy = this.jumpForce;
                sfx.jump();
            }
        }
    };

    class Obstacle {
        constructor() {
            this.types = ['sapi', 'gerobak', 'batu'];
            this.type = this.types[Math.floor(Math.random() * this.types.length)];
            this.width = this.type === 'gerobak' ? 70 : 50;
            this.height = this.type === 'batu' ? 30 : 50;
            this.x = canvas.width + 100;
            this.y = canvas.height - 80 - this.height;
        }
        draw() {
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#000';
            if (this.type === 'sapi') {
                ctx.fillStyle = 'white';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeRect(this.x, this.y, this.width, this.height);
                ctx.fillStyle = 'black';
                ctx.fillRect(this.x + 10, this.y + 10, 15, 15); // Spots
            } else if (this.type === 'gerobak') {
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(this.x, this.y, this.width, this.height - 10);
                ctx.strokeRect(this.x, this.y, this.width, this.height - 10);
                ctx.beginPath();
                ctx.arc(this.x + 20, this.y + 40, 10, 0, Math.PI * 2);
                ctx.arc(this.x + 50, this.y + 40, 10, 0, Math.PI * 2);
                ctx.fill(); ctx.stroke();
            } else {
                ctx.fillStyle = '#777';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + this.height);
                ctx.lineTo(this.x + 10, this.y);
                ctx.lineTo(this.x + 40, this.y + 5);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.closePath(); ctx.fill(); ctx.stroke();
            }
        }
        update() {
            this.x -= gameSpeed;
        }
    }

    class Coin {
        constructor() {
            this.width = 25;
            this.height = 25;
            this.x = canvas.width + 100;
            this.y = canvas.height - 150 - Math.random() * 100;
            this.collected = false;
        }
        draw() {
            if (this.collected) return;
            ctx.fillStyle = varColor('--gold');
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(this.x + 12, this.y + 12, 12, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#000';
            ctx.fillText("Rp", this.x + 4, this.y + 18);
        }
        update() {
            this.x -= gameSpeed;
        }
    }

    let obstacles = [];
    let coins = [];
    let clouds = [];

    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    // Parallax Background
    function drawBackground() {
        // Sky is handled by CSS
        
        // Far: Mountains
        ctx.fillStyle = '#458B74';
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - 50);
        for(let i=0; i<=canvas.width; i+=100) {
            ctx.lineTo(i, canvas.height - 150 - Math.sin(i*0.01 + frameCount*0.002)*20);
        }
        ctx.lineTo(canvas.width, canvas.height);
        ctx.lineTo(0, canvas.height);
        ctx.fill();

        // Mid: Sawah/Village
        ctx.fillStyle = '#228B22';
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
        
        // Ground (Neubrutalism path)
        ctx.fillStyle = '#DEB887';
        ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - 80);
        ctx.lineTo(canvas.width, canvas.height - 80);
        ctx.stroke();
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width &&
               rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height &&
               rect1.y + rect1.height > rect2.y;
    }

    function spawnItems() {
        if (frameCount % 100 === 0) {
            obstacles.push(new Obstacle());
        }
        if (frameCount % 140 === 0) {
            coins.push(new Coin());
        }
    }

    function update() {
        if (!gameActive) return;

        frameCount++;
        gameSpeed = 5 + (score / 200);

        player.update();
        spawnItems();

        obstacles.forEach((obs, index) => {
            obs.update();
            if (checkCollision(player, obs)) {
                obstacles.splice(index, 1);
                lives--;
                sfx.hit();
                if (lives <= 0) gameOver();
            }
            if (obs.x + obs.width < 0) {
                obstacles.splice(index, 1);
                score += 5;
            }
        });

        coins.forEach((coin, index) => {
            coin.update();
            if (!coin.collected && checkCollision(player, coin)) {
                coin.collected = true;
                score += 20;
                sfx.coin();
            }
            if (coin.x + coin.width < 0) coins.splice(index, 1);
        });

        scoreEl.innerText = score;
        livesEl.innerText = lives;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        
        coins.forEach(c => c.draw());
        obstacles.forEach(o => o.draw());
        player.draw();

        if (gameActive) requestAnimationFrame(() => {
            update();
            draw();
        });
    }

    function startGame() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        score = 0;
        lives = 3;
        gameSpeed = 5;
        obstacles = [];
        coins = [];
        gameActive = true;
        
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        draw();
    }

    function gameOver() {
        gameActive = false;
        sfx.gameOver();
        
        let high = localStorage.getItem('pestaKampungHigh') || 0;
        if (score > high) {
            high = score;
            localStorage.setItem('pestaKampungHigh', high);
        }
        
        finalScoreEl.innerText = score;
        highScoreEl.innerText = high;
        gameOverScreen.classList.remove('hidden');
    }

    // Controls
    const handleAction = (e) => {
        if (e.type === 'keydown' && e.code !== 'Space') return;
        if (gameActive) player.jump();
        e.preventDefault();
    };

    window.addEventListener('keydown', handleAction);
    window.addEventListener('touchstart', handleAction, { passive: false });
    window.addEventListener('mousedown', (e) => {
        if (e.target.tagName !== 'BUTTON') handleAction(e);
    });

</script>
</body>
</html>
