<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOLA PINTAR - Basket Matematika</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #E65100;
            --blue: #1565C0;
            --yellow: #FFD600;
            --white: #FFFFFF;
            --dark: #000000;
            --border: 4px solid #000000;
            --shadow: 6px 6px 0px #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--blue);
            font-family: 'Poppins', sans-serif;
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        /* Container Utama */
        #app {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: #E3F2FD;
            border: var(--border);
            box-shadow: 12px 12px 0px var(--dark);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 10px;
            background: var(--orange);
            border-bottom: var(--border);
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            z-index: 10;
        }

        .back-btn {
            background: var(--white);
            color: var(--dark);
            text-decoration: none;
            padding: 5px 10px;
            border: 2px solid var(--dark);
            box-shadow: 3px 3px 0px var(--dark);
            font-size: 0.7rem;
            font-weight: 900;
            width: fit-content;
        }

        .stats {
            text-align: center;
            font-family: 'Anton', sans-serif;
            color: var(--white);
            font-size: 1.2rem;
            text-shadow: 2px 2px 0px var(--dark);
        }

        .lives {
            text-align: right;
            font-size: 1.2rem;
        }

        /* Game Board */
        #game-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: crosshair;
            background-image: 
                linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Question Banner */
        #question-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--yellow);
            padding: 10px 30px;
            border: var(--border);
            box-shadow: var(--shadow);
            font-family: 'Anton', sans-serif;
            font-size: 2rem;
            white-space: nowrap;
            z-index: 5;
        }

        /* Screens */
        .screen {
            position: absolute;
            inset: 0;
            background: rgba(21, 101, 192, 0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 100;
        }

        .hidden { display: none !important; }

        h1 {
            font-family: 'Anton', sans-serif;
            font-size: 3.5rem;
            color: var(--orange);
            -webkit-text-stroke: 2px var(--white);
            margin-bottom: 10px;
            line-height: 1;
        }

        .btn {
            background: var(--yellow);
            color: var(--dark);
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: 900;
            border: var(--border);
            box-shadow: var(--shadow);
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .btn:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px var(--dark);
        }

        .result-score {
            font-size: 4rem;
            font-family: 'Anton', sans-serif;
            margin: 20px 0;
            color: var(--yellow);
        }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <a href="/#games" class="back-btn">⬅ KEMBALI</a>
            <div class="stats">SKOR: <span id="score-val">0</span></div>
            <div class="lives" id="lives-val">❤️❤️❤️</div>
        </header>

        <div id="game-area">
            <div id="question-overlay" class="hidden">5 + 5 = ?</div>
            <canvas id="gameCanvas"></canvas>
        </div>

        <!-- Menu Screen -->
        <div id="screen-menu" class="screen">
            <h1>BOLA PINTAR</h1>
            <p>Klik bola dengan jawaban yang benar!</p>
            <div style="font-size: 3rem; margin: 20px;">🏀</div>
            <button class="btn" onclick="startGame()">MAIN SEKARANG</button>
        </div>

        <!-- Game Over Screen -->
        <div id="screen-over" class="screen hidden">
            <h1>GAME OVER</h1>
            <p>Skor Akhir Kamu:</p>
            <div class="result-score" id="final-score">0</div>
            <button class="btn" onclick="startGame()">COBA LAGI</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const questionOverlay = document.getElementById('question-overlay');
        const scoreVal = document.getElementById('score-val');
        const livesVal = document.getElementById('lives-val');
        
        let score = 0;
        let lives = 3;
        let gameActive = false;
        let balls = [];
        let currentProblem = { q: "", a: 0 };
        let lastSpawn = 0;
        let spawnRate = 2000; // ms
        let speedMultiplier = 1;

        // Sound Engine
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function resize() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        window.addEventListener('resize', resize);
        resize();

        function generateProblem() {
            const type = Math.floor(Math.random() * 3); // 0:+, 1:-, 2:*
            let a, b, q, ans;

            if (type === 0) {
                a = Math.floor(Math.random() * 20) + 1;
                b = Math.floor(Math.random() * 20) + 1;
                q = `${a} + ${b}`;
                ans = a + b;
            } else if (type === 1) {
                a = Math.floor(Math.random() * 20) + 10;
                b = Math.floor(Math.random() * a) + 1;
                q = `${a} - ${b}`;
                ans = a - b;
            } else {
                a = Math.floor(Math.random() * 10) + 1;
                b = Math.floor(Math.random() * 10) + 1;
                q = `${a} × ${b}`;
                ans = a * b;
            }
            return { q, a: ans };
        }

        class Ball {
            constructor(value, isCorrect) {
                this.radius = 35;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.value = value;
                this.isCorrect = isCorrect;
                this.speed = (Math.random() * 1 + 1.5) * speedMultiplier;
                this.angle = 0;
                this.rotation = Math.random() * 0.05 - 0.025;
            }

            update() {
                this.y += this.speed;
                this.angle += this.rotation;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Ball shadow
                ctx.beginPath();
                ctx.arc(4, 4, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fill();

                // Ball body
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#E65100';
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#000';
                ctx.stroke();

                // Basketball lines
                ctx.beginPath();
                ctx.moveTo(-this.radius, 0); ctx.lineTo(this.radius, 0);
                ctx.moveTo(0, -this.radius); ctx.lineTo(0, this.radius);
                ctx.stroke();

                // Value
                ctx.rotate(-this.angle);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 24px Poppins';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 4;
                ctx.strokeText(this.value, 0, 0);
                ctx.fillText(this.value, 0, 0);

                ctx.restore();
            }
        }

        function startGame() {
            score = 0;
            lives = 3;
            balls = [];
            speedMultiplier = 1;
            gameActive = true;
            updateUI();
            currentProblem = generateProblem();
            questionOverlay.innerText = `${currentProblem.q} = ?`;
            questionOverlay.classList.remove('hidden');
            document.getElementById('screen-menu').classList.add('hidden');
            document.getElementById('screen-over').classList.add('hidden');
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            scoreVal.innerText = score;
            livesVal.innerText = "❤️".repeat(lives);
        }

        function spawnBalls() {
            const now = Date.now();
            if (now - lastSpawn > spawnRate) {
                // Spawn satu set: 1 benar, 1-2 salah
                const correctPos = Math.floor(Math.random() * 3);
                for(let i=0; i<3; i++) {
                    let val;
                    if (i === correctPos) {
                        val = currentProblem.a;
                    } else {
                        val = currentProblem.a + (Math.floor(Math.random() * 10) + 1) * (Math.random() > 0.5 ? 1 : -1);
                        if (val < 0) val = Math.abs(val) + 2;
                    }
                    balls.push(new Ball(val, i === correctPos));
                }
                lastSpawn = now;
                // Scale difficulty
                if (spawnRate > 800) spawnRate -= 50;
                speedMultiplier += 0.02;
            }
        }

        function gameLoop() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            spawnBalls();

            for (let i = balls.length - 1; i >= 0; i--) {
                const b = balls[i];
                b.update();
                b.draw();

                // Missed the correct ball
                if (b.y > canvas.height + b.radius) {
                    if (b.isCorrect) {
                        lives--;
                        playSound(150, 'sawtooth', 0.2);
                        updateUI();
                        if (lives <= 0) gameOver();
                        // Change problem if missed
                        currentProblem = generateProblem();
                        questionOverlay.innerText = `${currentProblem.q} = ?`;
                    }
                    balls.splice(i, 1);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function checkClick(e) {
            if (!gameActive) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX || e.touches[0].clientX) - rect.left;
            const mouseY = (e.clientY || e.touches[0].clientY) - rect.top;

            for (let i = balls.length - 1; i >= 0; i--) {
                const b = balls[i];
                const dist = Math.sqrt((mouseX - b.x)**2 + (mouseY - b.y)**2);

                if (dist < b.radius + 10) {
                    if (b.isCorrect) {
                        score += 10;
                        playSound(600, 'sine', 0.1);
                        playSound(800, 'sine', 0.1);
                        // Blast effect or just remove correct balls
                        balls = []; 
                        currentProblem = generateProblem();
                        questionOverlay.innerText = `${currentProblem.q} = ?`;
                    } else {
                        lives--;
                        playSound(100, 'square', 0.3);
                        balls.splice(i, 1);
                    }
                    updateUI();
                    if (lives <= 0) gameOver();
                    break;
                }
            }
        }

        canvas.addEventListener('mousedown', checkClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            checkClick(e);
        }, {passive: false});

        function gameOver() {
            gameActive = false;
            document.getElementById('screen-over').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            questionOverlay.classList.add('hidden');
        }

    </script>
</body>
</html>
