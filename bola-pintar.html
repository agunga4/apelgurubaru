<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BOLA PINTAR - 3D Math Arcade</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --orange: #f97316;
      --ink: #0f172a;
      --border: 3px solid #0f172a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #020617; /* fallback */
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* === LAYAR PENUH TANPA BELAHAN HITAM === */
    .app {
      width: 100%;
      height: 100dvh;
      position: relative;
      margin: 0;
      background: radial-gradient(circle at 50% 0%, #1e3a8a 0%, #020617 55%, #0b1120 100%);
      overflow: hidden;
    }

    /* HEADER / HUD */
    header {
      position: absolute;
      top: 0;
      width: 100%;
      z-index: 20;
      padding: max(16px, env(safe-area-inset-top)) 16px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      gap: 8px;
    }

    .hud-row {
      display: flex;
      gap: 8px;
    }

    .hud-box {
      background: rgba(255,255,255,0.95);
      border: var(--border);
      border-radius: 14px;
      padding: 6px 10px;
      text-align: center;
      box-shadow: 0 6px 0 #0f172a;
      min-width: 70px;
    }

    .hud-label {
      font-size: 0.62rem;
      font-weight: 800;
      opacity: 0.6;
      letter-spacing: .03em;
    }

    .hud-val {
      font-size: 1rem;
      font-weight: 800;
      margin-top: 2px;
    }

    /* QUESTION BANNER */
    .question-banner {
      position: absolute;
      top: max(88px, calc(env(safe-area-inset-top) + 78px));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.98);
      border: var(--border);
      border-radius: 20px;
      padding: 10px 24px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      z-index: 20;
      width: min(82%, 640px);
    }

    .question-banner .small {
      font-size: 0.75rem;
      font-weight: 800;
      color: #64748b;
      letter-spacing: 1px;
    }

    .question-banner .big {
      font-family: 'Anton', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.2rem);
      color: var(--ink);
      margin-top: 2px;
      line-height: 1;
    }

    /* REVEAL TOAST */
    .reveal-toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(15,23,42,0.95);
      color: white;
      padding: 24px;
      border-radius: 24px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 50;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .reveal-toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .reveal-toast .r-ans {
      font-size: 2.5rem;
      font-family: 'Anton', sans-serif;
      line-height: 1;
    }

    .reveal-toast .r-stat {
      font-size: 1.2rem;
      font-weight: 800;
      margin-top: 8px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* INSTRUCTIONS */
    .hint {
      position: absolute;
      bottom: calc(30px + env(safe-area-inset-bottom));
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.85);
      font-size: 0.9rem;
      font-weight: 700;
      pointer-events: none;
      animation: pulse 1.5s infinite alternate;
      z-index: 10;
    }

    @keyframes pulse {
      0% { opacity: 0.4; transform: translateY(0); }
      100% { opacity: 0.95; transform: translateY(-4px); }
    }

    /* MENUS */
    .screen {
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 20px;
    }

    .hidden {
      display: none !important;
    }

    .panel {
      background: white;
      width: 100%;
      max-width: 380px;
      border-radius: 28px;
      padding: 30px 24px;
      text-align: center;
      border: var(--border);
      box-shadow: 0 20px 0 rgba(0,0,0,0.3);
    }

    .panel h1 {
      font-family: 'Anton', sans-serif;
      font-size: 3rem;
      color: var(--orange);
      line-height: 1;
      margin-bottom: 8px;
    }

    .panel p {
      font-weight: 700;
      color: #475569;
      margin-bottom: 24px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: var(--border);
      font-family: inherit;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      margin-bottom: 12px;
      background: white;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn-primary {
      background: var(--orange);
      color: white;
    }

    .btn:active {
      transform: translateY(4px);
    }

  </style>
</head>
<body>

  <div class="app">
    <header>
      <div class="hud-row">
        <div class="hud-box">
          <div class="hud-label">LEVEL</div>
          <div class="hud-val" id="levelVal">1</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">SKOR</div>
          <div class="hud-val" id="scoreVal">0</div>
        </div>
      </div>
      <div class="hud-row">
        <div class="hud-box">
          <div class="hud-label">WAKTU</div>
          <div class="hud-val" id="timeVal">8</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">NYAWA</div>
          <div class="hud-val" id="livesVal">❤️❤️❤️</div>
        </div>
      </div>
    </header>

    <div class="question-banner">
      <div class="small">JAWAB SOAL INI</div>
      <div class="big" id="questionText">10 + 5 = ?</div>
    </div>

    <div class="reveal-toast" id="revealBox">
      <div class="r-ans" id="revealAnswer">15</div>
      <div class="r-stat" id="revealStatus">BENAR!</div>
    </div>

    <div class="hint" id="hintText">☝️ Swipe (geser) ke atas ke arah ring</div>

    <canvas id="gameCanvas"></canvas>

    <!-- START SCREEN -->
    <div class="screen" id="startScreen">
      <div class="panel">
        <h1>BOLA PINTAR</h1>
        <p>Versi 3D First Person<br>Swipe ke ring jawaban yang benar!</p>
        <button class="btn btn-primary" onclick="startGame()">Mulai Main</button>
        <button class="btn" onclick="location.href='/#games'">Kembali ke Portal</button>
      </div>
    </div>

    <!-- OVER SCREEN -->
    <div class="screen hidden" id="overScreen">
      <div class="panel">
        <h1>GAME OVER</h1>
        <p>Skor Akhir Kamu:</p>
        <div style="font-family: 'Anton'; font-size: 4rem; color: #1e3a8a; line-height: 1; margin-bottom: 12px;" id="finalScoreVal">0</div>
        <p id="finalLevelText">Kamu mencapai Level 1</p>
        <button class="btn btn-primary" onclick="startGame()">Main Lagi</button>
      </div>
    </div>

  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let score = 0, lives = 3;
    let level = 1;
    let correctForLevel = 0;

    let gameActive = false;
    let animationId;
    let currentProblem = null;

    // Hoops
    let hoops = [];
    const HOOP_Y_RATIO = 0.38;

    // Ball
    let ball = {
      x: 0,
      y: 0,
      scale: 1.1,
      phase: 'ready',   // 'ready' | 'flying' | 'in-hoop' | 'returning'
      progress: 0,
      targetHoop: null,
      startX: 0,
      startY: 0
    };

    // Swipe + projection
    let swipeStart = null;
    let aimLine = null;

    // Particles + audio
    let particles = [];
    let audioCtx = null;

    // Timer
    let timeLeft = 8;
    let timeInterval = null;

    function initAudio() {
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if(audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
      if(!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'shoot') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
      } else if (type === 'correct') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      }
    }

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      width = rect.width;
      height = rect.height;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      resetBallPos();
      if (currentProblem) layoutHoops();
    }
    window.addEventListener('resize', resize);

    function resetBallPos() {
      ball.phase = 'ready';
      ball.progress = 0;
      ball.scale = 1.1;
      ball.x = width / 2;
      ball.y = height * 0.78;
      ball.targetHoop = null;
    }

    function generateProblem() {
      const a = Math.floor(Math.random() * 20) + 5;
      const b = Math.floor(Math.random() * 10) + 2;
      const ops = ['+', '-'];
      const op = ops[Math.floor(Math.random() * ops.length)];
      let ans = op === '+' ? a + b : a - b;

      let options = [ans];
      while(options.length < 3) {
        let wrong = ans + (Math.floor(Math.random() * 10) - 5);
        if (wrong !== ans && !options.includes(wrong) && wrong > 0) {
          options.push(wrong);
        }
      }
      options.sort(() => Math.random() - 0.5);

      return { q: `${a} ${op} ${b} = ?`, ans, options };
    }

    function layoutHoops() {
      const positions = [width * 0.18, width * 0.5, width * 0.82];
      const yPos = height * HOOP_Y_RATIO;
      
      hoops = currentProblem.options.map((val, i) => ({
        id: i,
        x: positions[i],
        y: yPos,
        val: val,
        isCorrect: val === currentProblem.ans,
        flash: null
      }));
    }

    function startTimer() {
      clearInterval(timeInterval);
      timeLeft = Math.max(4, 8 - (level - 1));
      document.getElementById('timeVal').innerText = timeLeft;

      timeInterval = setInterval(() => {
        if (!gameActive) { clearInterval(timeInterval); return; }
        timeLeft -= 1;
        document.getElementById('timeVal').innerText = Math.max(0, timeLeft);
        if (timeLeft <= 0) {
          clearInterval(timeInterval);
          if (ball.phase === 'ready') {
            const correct = hoops.find(h => h.isCorrect);
            ball.targetHoop = correct;
            ball.phase = 'in-hoop';
            ball.progress = 0;
            processHit({ ...correct, isCorrect: false });
          }
        }
      }, 1000);
    }

    function nextRound() {
      currentProblem = generateProblem();
      document.getElementById('questionText').innerText = currentProblem.q;
      layoutHoops();
      resetBallPos();
      aimLine = null;
      document.getElementById('hintText').style.display = 'block';
      startTimer();
    }

    function startGame() {
      initAudio();
      score = 0;
      lives = 3;
      level = 1;
      correctForLevel = 0;
      gameActive = true;
      document.getElementById('scoreVal').innerText = score;
      document.getElementById('livesVal').innerText = '❤️❤️❤️';
      document.getElementById('levelVal').innerText = level;
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('overScreen').classList.add('hidden');
      resize();
      nextRound();
      if (!animationId) loop();
    }

    function spawnParticles(x, y, color) {
      for(let i=0; i<20; i++) {
        particles.push({
          x: x, y: y,
          vx: (Math.random() - 0.5) * 8,
          vy: (Math.random() - 0.5) * 8 - 2,
          life: 1,
          color: color
        });
      }
    }

    function processHit(hoop) {
      const reveal = document.getElementById('revealBox');
      document.getElementById('revealAnswer').innerText = hoop.val;
      
      if (hoop.isCorrect) {
        score += 10 * level;
        correctForLevel++;
        document.getElementById('revealStatus').innerText = 'BENAR!';
        document.getElementById('revealStatus').style.color = '#86efac';
        playSound('correct');
        spawnParticles(hoop.x, hoop.y, '#fde047');
        hoops.forEach(h => { if(h.val === hoop.val) h.flash = '#22c55e'; });

        if (correctForLevel >= 5) {
          level++;
          correctForLevel = 0;
          document.getElementById('levelVal').innerText = level;
        }
      } else {
        correctForLevel = 0;
        lives--;
        document.getElementById('livesVal').innerText = lives > 0 ? '❤️'.repeat(lives) : '💔';
        document.getElementById('revealStatus').innerText = 'SALAH!';
        document.getElementById('revealStatus').style.color = '#fca5a5';
        playSound('wrong');
        spawnParticles(hoop.x, hoop.y, '#ef4444');
        hoops.forEach(h => { if(h.val === hoop.val) h.flash = '#ef4444'; });
      }

      document.getElementById('scoreVal').innerText = score;
      reveal.classList.add('show');
      clearInterval(timeInterval);

      setTimeout(() => {
        reveal.classList.remove('show');
        hoops.forEach(h => h.flash = null);

        if (lives <= 0) {
          gameActive = false;
          document.getElementById('finalScoreVal').innerText = score;
          document.getElementById('finalLevelText').innerText = `Kamu mencapai Level ${level}`;
          document.getElementById('overScreen').classList.remove('hidden');
        } else {
          nextRound();
        }
      }, 900);
    }

    // DRAWING
    function draw3DCourt() {
      ctx.fillStyle = '#020617';
      ctx.fillRect(0, 0, width, height);

      const horizonY = height * 0.45;
      const floorColor = level >= 4 ? '#b45309' : '#c2410c';

      // Floor
      ctx.fillStyle = floorColor;
      ctx.beginPath();
      ctx.moveTo(0, horizonY);
      ctx.lineTo(width, horizonY);
      ctx.lineTo(width * 1.5, height);
      ctx.lineTo(-width * 0.5, height);
      ctx.fill();

      // Lane lines
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(width * 0.5, horizonY);
      ctx.lineTo(width * 0.5, height);
      ctx.moveTo(width * 0.25, horizonY);
      ctx.lineTo(-width * 0.2, height);
      ctx.moveTo(width * 0.75, horizonY);
      ctx.lineTo(width * 1.2, height);
      ctx.stroke();

      // Floor glow
      let g = ctx.createLinearGradient(0, horizonY, 0, height);
      g.addColorStop(0, 'rgba(0,0,0,0.8)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, horizonY, width, height);
    }

    function drawHoops() {
      hoops.forEach(h => {
        ctx.fillStyle = h.flash ? h.flash : '#f8fafc';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(h.x - 45, h.y - 65, 90, 60, 8);
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = h.flash ? '#fff' : 'rgba(0,0,0,0.2)';
        ctx.strokeRect(h.x - 20, h.y - 35, 40, 30);

        ctx.fillStyle = h.flash ? '#fff' : '#0f172a';
        ctx.font = '800 24px "Plus Jakarta Sans"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(h.val, h.x, h.y - 45);

        ctx.fillStyle = '#334155';
        ctx.fillRect(h.x - 4, h.y, 8, height - h.y);

        ctx.beginPath();
        ctx.ellipse(h.x, h.y, 25, 8, 0, Math.PI, Math.PI*2);
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 4;
        ctx.stroke();
      });
    }

    function drawHoopFronts() {
      hoops.forEach(h => {
        ctx.beginPath();
        ctx.ellipse(h.x, h.y, 25, 8, 0, 0, Math.PI);
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(h.x - 25, h.y); ctx.lineTo(h.x - 15, h.y + 25);
        ctx.moveTo(h.x + 25, h.y); ctx.lineTo(h.x + 15, h.y + 25);
        ctx.moveTo(h.x - 10, h.y); ctx.lineTo(h.x, h.y + 25);
        ctx.moveTo(h.x + 10, h.y); ctx.lineTo(h.x, h.y + 25);
        ctx.stroke();
      });
    }

    function drawProjectionLine() {
      if (!aimLine) return;
      ctx.save();
      ctx.strokeStyle = 'rgba(248,250,252,' + aimLine.alpha + ')';
      ctx.lineWidth = 3;
      ctx.setLineDash([10, 8]);
      ctx.beginPath();
      ctx.moveTo(aimLine.startX, aimLine.startY);
      ctx.lineTo(aimLine.endX, aimLine.endY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawBall() {
      const r = 35 * ball.scale;

      if (ball.phase === 'ready') {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.ellipse(ball.x, ball.y + r + 10, r*0.8, r*0.3, 0, 0, Math.PI*2);
        ctx.fill();
      }

      ctx.save();
      ctx.translate(ball.x, ball.y);
      if (ball.phase === 'flying' || ball.phase === 'returning') {
        ctx.rotate(ball.progress * Math.PI * 4);
      }

      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fillStyle = '#f97316';
      ctx.fill();
      ctx.lineWidth = 2 * ball.scale;
      ctx.strokeStyle = '#431407';
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(-r, 0); ctx.lineTo(r, 0);
      ctx.moveTo(0, -r); ctx.lineTo(0, r);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(-r*0.6, 0, r*0.7, -1.1, 1.1);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(r*0.6, 0, r*0.7, 2.04, 4.24);
      ctx.stroke();

      ctx.restore();
    }

    function drawParticles() {
      for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2;
        p.life -= 0.02;

        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;

        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function loop() {
      if (!gameActive) { animationId = null; return; }

      if (ball.phase === 'flying') {
        ball.progress += 0.03;
        if (ball.progress >= 1) {
          ball.progress = 0;
          ball.phase = 'in-hoop';
          processHit(ball.targetHoop);
        } else {
          const t = ball.progress;
          ball.x = ball.startX + (ball.targetHoop.x - ball.startX) * t;
          ball.scale = 1.1 - (t * 0.8);
          const arc = Math.sin(t * Math.PI);
          ball.y = ball.startY + (ball.targetHoop.y - ball.startY) * t - (arc * height * 0.35);
        }
      } else if (ball.phase === 'in-hoop' && ball.targetHoop) {
        ball.progress += 0.05;
        ball.x = ball.targetHoop.x;
        ball.y = ball.targetHoop.y + 10;
        ball.scale = 0.45;
        if (ball.progress >= 1) {
          ball.phase = 'returning';
          ball.progress = 0;
        }
      } else if (ball.phase === 'returning' && ball.targetHoop) {
        const t = ball.progress;
        const tx = width / 2;
        const ty = height * 0.78;
        ball.x = ball.targetHoop.x + (tx - ball.targetHoop.x) * t;
        ball.y = (ball.targetHoop.y + 10) + (ty - (ball.targetHoop.y + 10)) * t;
        ball.scale = 0.45 + (1.1 - 0.45) * t;
        ball.progress += 0.05;
        if (ball.progress >= 1) {
          resetBallPos();
        }
      }

      draw3DCourt();
      drawHoops();
      drawProjectionLine();
      drawBall();
      drawHoopFronts();
      drawParticles();

      animationId = requestAnimationFrame(loop);
    }

    // INPUT
    function getPointerPos(e) {
      const touch = e.touches ? e.touches[0] : e;
      return { x: touch.clientX, y: touch.clientY };
    }

    function startSwipe(e) {
      if (!gameActive || ball.phase !== 'ready') return;
      initAudio();
      swipeStart = getPointerPos(e);
      aimLine = null;
    }

    function moveSwipe(e) {
      if (!gameActive || ball.phase !== 'ready' || !swipeStart) return;
      const pos = getPointerPos(e);
      const dx = pos.x - swipeStart.x;
      const dy = pos.y - swipeStart.y;

      if (dy > -10) { aimLine = null; return; }

      const len = Math.hypot(dx, dy) || 1;
      const nx = dx / len;
      const ny = dy / len;
      const projLen = 260;

      aimLine = {
        startX: ball.x,
        startY: ball.y,
        endX: ball.x + nx * projLen,
        endY: ball.y + ny * projLen,
        alpha: 0.55
      };
    }

    function endSwipe(e) {
      if (!gameActive || ball.phase !== 'ready' || !swipeStart) return;

      const touch = e.changedTouches ? e.changedTouches[0] : e;
      const endX = touch.clientX;
      const endY = touch.clientY;

      const dx = endX - swipeStart.x;
      const dy = endY - swipeStart.y;
      swipeStart = null;

      if (dy > -30) { aimLine = null; return; }

      document.getElementById('hintText').style.display = 'none';

      const projectedX = ball.x + (dx / Math.abs(dy)) * (ball.y - hoops[0].y);

      let target = hoops[0];
      let minD = Math.abs(projectedX - target.x);
      for(let i=1; i<3; i++) {
        let d = Math.abs(projectedX - hoops[i].x);
        if (d < minD) {
          minD = d;
          target = hoops[i];
        }
      }

      ball.phase = 'flying';
      ball.progress = 0;
      ball.startX = ball.x;
      ball.startY = ball.y;
      ball.targetHoop = target;
      aimLine = null;
      playSound('shoot');
    }

    window.addEventListener('mousedown', startSwipe);
    window.addEventListener('mousemove', moveSwipe);
    window.addEventListener('mouseup', endSwipe);
    window.addEventListener('touchstart', startSwipe, {passive: false});
    window.addEventListener('touchmove', (e) => {
      moveSwipe(e);
      if(gameActive && ball.phase === 'ready') e.preventDefault();
    }, {passive: false});
    window.addEventListener('touchend', endSwipe, {passive: false});
  </script>
</body>
</html>
