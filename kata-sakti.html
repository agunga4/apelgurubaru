<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KATA SAKTI - APeL</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #00BFA5;
            --orange: #FF6D00;
            --dark: #1a1a1a;
            --white: #ffffff;
            --border: 3px solid #000;
            --shadow: 6px 6px 0px #000;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fredoka One', cursive;
            background-color: #004d40;
            background-image: radial-gradient(circle, #00BFA5 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Particles Background */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .game-container {
            width: 95%;
            max-width: 500px;
            background: var(--white);
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Header UI */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .stat-box {
            background: var(--teal);
            border: var(--border);
            padding: 5px 10px;
            color: white;
            box-shadow: 3px 3px 0px #000;
            font-size: 0.9rem;
        }

        .timer-box { background: var(--orange); }

        /* Grid Game */
        #grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background: #000;
            border: var(--border);
            padding: 4px;
            margin-bottom: 20px;
            touch-action: none;
        }

        .cell {
            aspect-ratio: 1/1;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
        }

        .cell.selected {
            background: var(--orange);
            color: white;
        }

        .cell.found {
            background: var(--teal);
            color: white;
        }

        /* Word List */
        .word-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .word-item {
            border: 2px solid #000;
            padding: 5px;
            text-align: center;
            background: #eee;
            font-size: 0.8rem;
            text-decoration: none;
        }

        .word-item.done {
            background: var(--teal);
            color: white;
            text-decoration: line-through;
            opacity: 0.6;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            font-family: 'Fredoka One', cursive;
            padding: 10px;
            border: var(--border);
            box-shadow: 3px 3px 0px #000;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.1s;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }

        .btn-back { background: #ff5252; color: white; }
        .btn-restart { background: var(--teal); color: white; }

        /* Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        .overlay h2 { font-size: 2.5rem; margin: 0 0 20px 0; color: var(--orange); -webkit-text-stroke: 1.5px #000; }
        
        .level-select {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .level-btn {
            background: var(--teal);
            color: white;
        }

        /* Confetti Canvas */
        #confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        @media (max-width: 400px) {
            .cell { font-size: 0.9rem; }
            .game-container { padding: 10px; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <canvas id="confetti"></canvas>

    <div class="game-container">
        <header>
            <div class="stat-box">SKOR: <span id="score">0</span></div>
            <div class="stat-box timer-box">WAKTU: <span id="timer">120</span></div>
        </header>

        <div id="grid"></div>

        <div class="word-list" id="word-list"></div>

        <div class="controls">
            <button class="btn-back" onclick="window.location.href='https://apel-pembelajaran.vercel.app'">KEMBALI</button>
            <button class="btn-restart" onclick="location.reload()">RESTART</button>
        </div>

        <!-- Menu Start -->
        <div id="start-menu" class="overlay">
            <h2>KATA SAKTI</h2>
            <p>Temukan 8 kata tersembunyi!</p>
            <div class="level-select">
                <button class="level-btn" onclick="startGame('EASY')">MUDAH (3-4 Huruf)</button>
                <button class="level-btn" style="background:#FFAB40" onclick="startGame('MEDIUM')">SEDANG (5-6 Huruf)</button>
                <button class="level-btn" style="background:#D500F9" onclick="startGame('HARD')">SULIT (7-8 Huruf)</button>
            </div>
        </div>

        <!-- Menu Game Over / Win -->
        <div id="end-menu" class="overlay" style="display: none;">
            <h2 id="end-title">BAGUS!</h2>
            <p id="end-msg">Skor Akhir: 0</p>
            <button class="level-btn" onclick="location.reload()">MAIN LAGI</button>
        </div>
    </div>

    <script>
        const KOSAKATA = ["MAMA", "PAPA", "BUKU", "MEJA", "KURSI", "PINTU", "JENDELA", "KUCING", "ANJING", "IKAN", "BURUNG", "POHON", "BUNGA", "RUMAH", "TEMAN", "GURU", "MURID", "SEKOLAH", "MAKAN", "MINUM", "TIDUR", "JALAN", "LARI", "BACA", "TULIS"];
        
        let grid = [];
        let targetWords = [];
        let foundWords = [];
        let selectedCells = [];
        let score = 0;
        let timeLeft = 120;
        let gameActive = false;
        let timerInterval;

        // Audio Context
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const clickSound = () => playSound(400, 'sine', 0.1);
        const successSound = () => {
            playSound(500, 'triangle', 0.2);
            setTimeout(() => playSound(800, 'triangle', 0.3), 100);
        };

        // Initialize Particles Background
        const pCanvas = document.getElementById('particle-canvas');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];
        function initParticles() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
            for(let i=0; i<30; i++) {
                particles.push({
                    x: Math.random() * pCanvas.width,
                    y: Math.random() * pCanvas.height,
                    r: Math.random() * 3 + 1,
                    v: Math.random() * 0.5 + 0.2
                });
            }
        }
        function drawParticles() {
            pCtx.clearRect(0,0,pCanvas.width, pCanvas.height);
            pCtx.fillStyle = "rgba(255,255,255,0.3)";
            particles.forEach(p => {
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                pCtx.fill();
                p.y -= p.v;
                if(p.y < -10) p.y = pCanvas.height + 10;
            });
            requestAnimationFrame(drawParticles);
        }

        // Word Search Logic
        function startGame(level) {
            document.getElementById('start-menu').style.display = 'none';
            gameActive = true;
            
            // Filter words by level
            let filtered = [];
            if(level === 'EASY') filtered = KOSAKATA.filter(w => w.length <= 4);
            else if(level === 'MEDIUM') filtered = KOSAKATA.filter(w => w.length >= 5 && w.length <= 6);
            else filtered = KOSAKATA.filter(w => w.length >= 7);

            // Pick 8 random words
            targetWords = filtered.sort(() => 0.5 - Math.random()).slice(0, 8);
            
            generateGrid();
            renderGrid();
            renderWordList();
            startTimer();
        }

        function generateGrid() {
            grid = Array(100).fill(null);
            
            targetWords.forEach(word => {
                let placed = false;
                while(!placed) {
                    const dir = [[1,0], [0,1], [1,1], [-1,1]][Math.floor(Math.random()*4)];
                    const x = Math.floor(Math.random()*10);
                    const y = Math.floor(Math.random()*10);
                    
                    if(canPlace(word, x, y, dir)) {
                        for(let i=0; i<word.length; i++) {
                            grid[(y + i*dir[1])*10 + (x + i*dir[0])] = word[i];
                        }
                        placed = true;
                    }
                }
            });

            // Fill empty
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for(let i=0; i<100; i++) {
                if(!grid[i]) grid[i] = letters[Math.floor(Math.random()*26)];
            }
        }

        function canPlace(word, x, y, dir) {
            for(let i=0; i<word.length; i++) {
                const nx = x + i*dir[0];
                const ny = y + i*dir[1];
                if(nx < 0 || nx >= 10 || ny < 0 || ny >= 10) return false;
                const char = grid[ny*10 + nx];
                if(char && char !== word[i]) return false;
            }
            return true;
        }

        function renderGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            grid.forEach((char, i) => {
                const div = document.createElement('div');
                div.className = 'cell';
                div.textContent = char;
                div.dataset.index = i;
                div.onclick = () => handleSelect(i);
                gridEl.appendChild(div);
            });
        }

        function renderWordList() {
            const listEl = document.getElementById('word-list');
            listEl.innerHTML = '';
            targetWords.forEach(word => {
                const div = document.createElement('div');
                div.className = 'word-item';
                div.id = 'word-' + word;
                div.textContent = word;
                listEl.appendChild(div);
            });
        }

        function handleSelect(index) {
            if(!gameActive) return;
            clickSound();
            const cells = document.querySelectorAll('.cell');
            
            if(selectedCells.length === 0) {
                selectedCells.push(index);
                cells[index].classList.add('selected');
            } else if(selectedCells.length === 1) {
                const start = selectedCells[0];
                const end = index;
                
                if(start === end) {
                    cells[start].classList.remove('selected');
                    selectedCells = [];
                    return;
                }

                const path = getPath(start, end);
                if(path) {
                    const selectedWord = path.map(i => grid[i]).join('');
                    const reversedWord = selectedWord.split('').reverse().join('');
                    
                    if(targetWords.includes(selectedWord) && !foundWords.includes(selectedWord)) {
                        markFound(path, selectedWord);
                    } else if(targetWords.includes(reversedWord) && !foundWords.includes(reversedWord)) {
                        markFound(path, reversedWord);
                    }
                }
                
                // Reset Selection
                cells[start].classList.remove('selected');
                selectedCells = [];
            }
        }

        function getPath(start, end) {
            const x1 = start % 10, y1 = Math.floor(start / 10);
            const x2 = end % 10, y2 = Math.floor(end / 10);
            const dx = x2 - x1, dy = y2 - y1;
            const dist = Math.max(Math.abs(dx), Math.abs(dy));
            
            if(dx !== 0 && dy !== 0 && Math.abs(dx) !== Math.abs(dy)) return null;
            
            const stepX = dx === 0 ? 0 : dx / dist;
            const stepY = dy === 0 ? 0 : dy / dist;
            
            let path = [];
            for(let i=0; i<=dist; i++) {
                path.push((y1 + i*stepY)*10 + (x1 + i*stepX));
            }
            return path;
        }

        function markFound(path, word) {
            successSound();
            foundWords.push(word);
            path.forEach(i => {
                document.querySelector(`[data-index="${i}"]`).classList.add('found');
            });
            document.getElementById('word-' + word).classList.add('done');
            
            score += 100;
            document.getElementById('score').textContent = score;

            if(foundWords.length === targetWords.length) {
                endGame(true);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                if(timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function endGame(win) {
            gameActive = false;
            clearInterval(timerInterval);
            const overlay = document.getElementById('end-menu');
            const title = document.getElementById('end-title');
            const msg = document.getElementById('end-msg');
            
            overlay.style.display = 'flex';
            if(win) {
                title.textContent = "SAKTI!";
                msg.textContent = "Semua kata ditemukan! Skor: " + (score + timeLeft);
                startConfetti();
            } else {
                title.textContent = "WAKTU HABIS";
                title.style.color = "#ff5252";
                msg.textContent = "Jangan menyerah! Skor: " + score;
            }
        }

        // Confetti Effect
        function startConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let pieces = [];
            for(let i=0; i<100; i++) {
                pieces.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height - canvas.height,
                    size: Math.random()*10+5,
                    color: `hsl(${Math.random()*360}, 80%, 50%)`,
                    v: Math.random()*3+2
                });
            }
            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                pieces.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                    p.y += p.v;
                    if(p.y > canvas.height) p.y = -20;
                });
                if(gameActive === false) requestAnimationFrame(draw);
            }
            draw();
        }

        window.onload = () => {
            initParticles();
            drawParticles();
        };
    </script>
</body>
</html>
