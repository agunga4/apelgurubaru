<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOODLE PINTAR - APeL</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #E91E63;
            --yellow: #FFC107;
            --black: #1A1A1A;
            --white: #FFFFFF;
            --shadow: 6px 6px 0px #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: #f0f0f0;
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px), linear-gradient(#ffffff 1.5px, transparent 1.5px);
            background-size: 20px 20px, 100% 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            background: var(--white);
            border: 4px solid var(--black);
            box-shadow: 12px 12px 0px var(--black);
            position: relative;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: var(--yellow);
            border: 2px solid var(--black);
            padding: 5px 10px;
            text-decoration: none;
            color: var(--black);
            font-weight: bold;
            box-shadow: 3px 3px 0px var(--black);
            font-size: 14px;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: var(--pink);
            font-size: 28px;
            text-shadow: 2px 2px 0px var(--black);
            text-align: center;
        }

        #stats {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 18px;
            background: #eee;
            padding: 5px 10px;
            border: 3px solid var(--black);
        }

        #canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: white;
            border: 4px solid var(--black);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #timer-bar {
            height: 15px;
            background: #eee;
            border: 3px solid var(--black);
            width: 100%;
            position: relative;
        }

        #timer-fill {
            height: 100%;
            background: var(--pink);
            width: 100%;
            transition: width 0.1s linear;
        }

        #hint-area {
            text-align: center;
            font-weight: bold;
            background: var(--yellow);
            padding: 5px;
            border: 3px solid var(--black);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .opt-btn {
            background: var(--white);
            border: 3px solid var(--black);
            padding: 12px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--black);
            transition: 0.1s;
            text-transform: uppercase;
        }

        .opt-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--black);
        }

        .opt-btn.correct { background: #4CAF50; color: white; }
        .opt-btn.wrong { background: #f44336; color: white; }

        .skip-btn {
            background: #ddd;
            border: 3px solid var(--black);
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--black);
        }

        /* Overlay Screens */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }

        .menu-btn {
            width: 200px;
            margin: 10px;
            padding: 15px;
            font-size: 18px;
            background: var(--yellow);
            border: 4px solid var(--black);
            box-shadow: 6px 6px 0px var(--black);
            font-weight: 800;
            cursor: pointer;
        }

        .hidden { display: none !important; }

        @media (max-width: 400px) {
            h1 { font-size: 22px; }
            .opt-btn { padding: 8px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <header>
            <a href="https://apel-pembelajaran.vercel.app" class="back-btn">← KEMBALI</a>
            <h1>Doodle Pintar</h1>
        </header>

        <div id="stats">
            <span id="score-display">SKOR: 0</span>
            <span id="level-display">LVL: MUDAH</span>
        </div>

        <div id="timer-bar"><div id="timer-fill"></div></div>

        <div id="canvas-wrapper">
            <canvas id="doodleCanvas" width="400" height="400"></canvas>
            <div id="hint-area">Petunjuk: <span id="hint-text">-</span></div>
        </div>

        <div class="options-grid" id="options-container">
            <!-- Tombol opsi akan muncul di sini -->
        </div>

        <button class="skip-btn" onclick="skipImage()">LEWATI (-5 Poin)</button>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <h1 style="font-size: 40px; margin-bottom: 20px;">DOODLE PINTAR</h1>
            <p style="margin-bottom: 20px; font-weight: bold;">Tebak gambarnya sebelum waktu habis!</p>
            <button class="menu-btn" onclick="startGame(0.5, 'MUDAH')">MUDAH</button>
            <button class="menu-btn" onclick="startGame(1, 'NORMAL')" style="background: var(--pink); color: white;">NORMAL</button>
            <button class="menu-btn" onclick="startGame(2, 'SULIT')">SULIT</button>
        </div>

        <!-- Game Over Screen -->
        <div id="end-screen" class="overlay hidden">
            <h1 style="font-size: 40px;">SELESAI!</h1>
            <p id="final-score" style="font-size: 24px; font-weight: 800; margin: 20px 0;">Skor: 0</p>
            <button class="menu-btn" onclick="location.reload()">MAIN LAGI</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('doodleCanvas');
        const ctx = canvas.getContext('2d');
        const optionsContainer = document.getElementById('options-container');
        const timerFill = document.getElementById('timer-fill');
        const hintText = document.getElementById('hint-text');
        const scoreDisplay = document.getElementById('score-display');
        const levelDisplay = document.getElementById('level-display');

        // Game State
        let score = 0;
        let currentQuestion = 0;
        let timer = 20;
        let timerInterval;
        let drawingInterval;
        let isDrawing = false;
        let speedMultiplier = 1;
        let currentPaths = [];
        let animationFrame;

        // Sound Engine
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Database Gambar (Procedural Drawing Data)
        // Format: [ { points: [[x,y],[x,y]], close: bool } ]
        const library = [
            { name: "Rumah", cat: "Bangunan", paths: [
                {p:[[100,300],[300,300],[300,150],[100,150]], close:true}, // Body
                {p:[[80,150],[200,50],[320,150]], close:true}, // Roof
                {p:[[180,300],[180,220],[220,220],[220,300]], close:true} // Door
            ]},
            { name: "Pohon", cat: "Alam", paths: [
                {p:[[180,350],[180,250],[220,250],[220,350]], close:true}, // Trunk
                {p:[[200,250],[130,250],[130,200],[160,150],[200,120],[240,150],[270,200],[270,250]], close:true} // Top
            ]},
            { name: "Matahari", cat: "Alam", paths: [
                {p:[[200,130],[240,150],[270,200],[260,250],[200,270],[140,250],[130,200],[160,150]], close:true},
                {p:[[200,80],[200,110]]}, {p:[[200,290],[200,320]]},
                {p:[[80,200],[110,200]]}, {p:[[290,200],[320,200]]}
            ]},
            { name: "Buku", cat: "Benda", paths: [
                {p:[[100,100],[200,120],[200,320],[100,300]], close:true},
                {p:[[200,120],[300,100],[300,300],[200,320]], close:true},
                {p:[[120,150],[180,165]]}, {p:[[120,200],[180,215]]},
                {p:[[220,165],[280,150]]}, {p:[[220,215],[280,200]]}
            ]},
            { name: "Kucing", cat: "Hewan", paths: [
                {p:[[150,250],[250,250],[250,320],[150,320]], close:true}, // Body
                {p:[[160,250],[160,180],[240,180],[240,250]], close:true}, // Head
                {p:[[160,180],[150,140],[185,180]]}, // Ear L
                {p:[[240,180],[250,140],[215,180]]}, // Ear R
                {p:[[250,280],[320,240]]} // Tail
            ]},
            { name: "Ikan", cat: "Hewan", paths: [
                {p:[[100,200],[150,150],[250,150],[300,200],[250,250],[150,250]], close:true},
                {p:[[300,200],[350,150],[350,250]], close:true}, // Tail
                {p:[[140,200],[145,200]]} // Eye
            ]},
            { name: "Bunga", cat: "Alam", paths: [
                {p:[[200,350],[200,250]]}, // Stem
                {p:[[200,200],[230,170],[200,140],[170,170]], close:true}, // Petals
                {p:[[200,200],[240,230],[270,200],[240,170]], close:true},
                {p:[[200,200],[160,230],[130,200],[160,170]], close:true}
            ]},
            { name: "Mobil", cat: "Kendaraan", paths: [
                {p:[[100,280],[300,280],[300,220],[250,220],[220,170],[150,170],[120,220],[100,220]], close:true},
                {p:[[130,280],[130,310],[170,310],[170,280]]}, // Wheel L
                {p:[[230,280],[230,310],[270,310],[270,280]]}  // Wheel R
            ]},
            { name: "Pesawat", cat: "Kendaraan", paths: [
                {p:[[100,200],[300,200],[320,180],[320,220],[300,200]], close:true}, // Body
                {p:[[180,200],[220,130],[250,200]]}, // Wing L
                {p:[[180,200],[220,270],[250,200]]}  // Wing R
            ]},
            { name: "Bintang", cat: "Alam", paths: [
                {p:[[200,50],[230,150],[330,150],[250,210],[280,310],[200,250],[120,310],[150,210],[70,150],[170,150]], close:true}
            ]},
            { name: "Apel", cat: "Makanan", paths: [
                {p:[[200,280],[150,260],[130,200],[150,140],[200,130],[250,140],[270,200],[250,260]], close:true},
                {p:[[200,130],[200,100],[220,80]]} // Stem
            ]},
            { name: "Pisang", cat: "Makanan", paths: [
                {p:[[100,150],[150,250],[250,250],[300,150],[250,200],[150,200]], close:true}
            ]},
            { name: "Mata", cat: "Tubuh", paths: [
                {p:[[100,200],[200,130],[300,200],[200,270]], close:true},
                {p:[[200,170],[220,200],[200,230],[180,200]], close:true}
            ]},
            { name: "Tangan", cat: "Tubuh", paths: [
                {p:[[150,350],[150,250],[130,230],[135,180],[155,180],[165,230]]}, // Thumb
                {p:[[165,230],[165,130],[190,130],[190,230]]}, // Finger 1
                {p:[[190,230],[190,110],[215,110],[215,230]]}, // Finger 2
                {p:[[215,230],[250,230],[250,350]], close:true}
            ]},
            { name: "Sepatu", cat: "Benda", paths: [
                {p:[[100,250],[100,300],[300,300],[300,250],[200,250],[180,200],[120,200]], close:true}
            ]},
            { name: "Jam", cat: "Benda", paths: [
                {p:[[200,100],[280,120],[300,200],[280,280],[200,300],[120,280],[100,200],[120,120]], close:true},
                {p:[[200,200],[200,130]]}, {p:[[200,200],[250,200]]}
            ]},
            { name: "Kunci", cat: "Benda", paths: [
                {p:[[100,200],[150,170],[200,200],[150,230]], close:true},
                {p:[[200,200],[320,200],[320,230]]},
                {p:[[280,200],[280,230]]}
            ]},
            { name: "Pensil", cat: "Benda", paths: [
                {p:[[100,300],[120,320],[320,120],[300,100]], close:true},
                {p:[[100,300],[110,270],[130,290]], close:true}
            ]},
            { name: "Kursi", cat: "Benda", paths: [
                {p:[[150,350],[150,250],[250,250],[250,350]]},
                {p:[[150,250],[150,150],[250,150],[250,250]]},
                {p:[[150,270],[250,270]]}
            ]},
            { name: "Meja", cat: "Benda", paths: [
                {p:[[100,200],[300,200],[320,230],[80,230]], close:true},
                {p:[[120,230],[120,330]]}, {p:[[280,230],[280,330]]}
            ]}
        ];

        let gameQuestions = [];

        function startGame(speed, levelName) {
            speedMultiplier = speed;
            levelDisplay.innerText = `LVL: ${levelName}`;
            document.getElementById('start-screen').classList.add('hidden');
            score = 0;
            currentQuestion = 0;
            scoreDisplay.innerText = `SKOR: ${score}`;
            gameQuestions = [...library].sort(() => Math.random() - 0.5);
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion >= gameQuestions.length) {
                endGame();
                return;
            }

            const q = gameQuestions[currentQuestion];
            hintText.innerText = `${q.cat} (${q.name.length} Huruf)`;
            timer = 20;
            updateTimerUI();
            
            // Create Options
            const opts = [q.name];
            while (opts.length < 4) {
                const rand = library[Math.floor(Math.random() * library.length)].name;
                if (!opts.includes(rand)) opts.push(rand);
            }
            opts.sort(() => Math.random() - 0.5);

            optionsContainer.innerHTML = '';
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, q.name, btn);
                optionsContainer.appendChild(btn);
            });

            startDrawing(q.paths);
            
            timerInterval = setInterval(() => {
                timer -= 0.1;
                updateTimerUI();
                if (timer <= 0) {
                    clearInterval(timerInterval);
                    checkAnswer('', q.name, null);
                }
            }, 100);
        }

        function updateTimerUI() {
            timerFill.style.width = (timer / 20) * 100 + "%";
            if (timer < 5) timerFill.style.background = "red";
            else timerFill.style.background = "var(--pink)";
        }

        function startDrawing(paths) {
            cancelAnimationFrame(animationFrame);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            let pathIdx = 0;
            let pointIdx = 0;
            
            function animate() {
                if (pathIdx >= paths.length) return;

                const path = paths[pathIdx];
                const pts = path.p;

                if (pointIdx < pts.length - 1) {
                    ctx.beginPath();
                    ctx.moveTo(pts[pointIdx][0], pts[pointIdx][1]);
                    ctx.lineTo(pts[pointIdx+1][0], pts[pointIdx+1][1]);
                    ctx.stroke();
                    pointIdx++;
                } else {
                    if (path.close) {
                        ctx.beginPath();
                        ctx.moveTo(pts[pts.length-1][0], pts[pts.length-1][1]);
                        ctx.lineTo(pts[0][0], pts[0][1]);
                        ctx.stroke();
                    }
                    pathIdx++;
                    pointIdx = 0;
                }

                // Kecepatan animasi diatur di sini
                setTimeout(() => {
                    animationFrame = requestAnimationFrame(animate);
                }, 50 / speedMultiplier);
            }
            animate();
        }

        function checkAnswer(selected, correct, btn) {
            clearInterval(timerInterval);
            cancelAnimationFrame(animationFrame);
            
            // Tunjukkan semua garis secara instan
            drawInstant(gameQuestions[currentQuestion].paths);

            const buttons = optionsContainer.querySelectorAll('.opt-btn');
            buttons.forEach(b => {
                b.disabled = true;
                if (b.innerText === correct) b.classList.add('correct');
            });

            if (selected === correct) {
                const gain = Math.ceil(timer * 5);
                score += gain;
                playSound(600, 'sine', 0.2);
                playSound(800, 'sine', 0.3);
            } else {
                if (btn) btn.classList.add('wrong');
                playSound(200, 'square', 0.3);
            }

            scoreDisplay.innerText = `SKOR: ${score}`;
            
            setTimeout(() => {
                currentQuestion++;
                nextQuestion();
            }, 1500);
        }

        function drawInstant(paths) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 6;
            paths.forEach(path => {
                ctx.beginPath();
                ctx.moveTo(path.p[0][0], path.p[0][1]);
                path.p.forEach(pt => ctx.lineTo(pt[0], pt[1]));
                if (path.close) ctx.closePath();
                ctx.stroke();
            });
        }

        function skipImage() {
            score = Math.max(0, score - 5);
            scoreDisplay.innerText = `SKOR: ${score}`;
            playSound(300, 'sawtooth', 0.1);
            checkAnswer('SKIP_ACTION', gameQuestions[currentQuestion].name, null);
        }

        function endGame() {
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `Skor Akhir: ${score}`;
            playSound(500, 'sine', 0.2);
            playSound(700, 'sine', 0.2);
            playSound(900, 'sine', 0.5);
        }

    </script>
</body>
</html>
